<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>372 Dental — Coming Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --purple: #6B3FA0;
  --purple-light: #8B5FBF;
  --purple-dark: #5A2D8C;
  --purple-pale: #EDE5F5;
  --purple-faint: #F8F5FC;
  --navy: #1A1A2E;
  --text: #333346;
  --slate: #555568;
  --white: #FFFFFF;
}

html, body {
  height: 100%;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--purple-faint);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
  position: relative;
}

/* Subtle background decoration */
body::before {
  content: '';
  position: absolute;
  top: -30%;
  right: -20%;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(107,63,160,0.06) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}

body::after {
  content: '';
  position: absolute;
  bottom: -30%;
  left: -15%;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(107,63,160,0.05) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}

.container {
  text-align: center;
  padding: 3rem 2rem;
  position: relative;
  z-index: 1;
  animation: fadeInUp 1s ease-out;
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.logo {
  width: 220px;
  margin-bottom: 3rem;
  filter: drop-shadow(0 2px 8px rgba(107,63,160,0.1));
}

.divider {
  width: 60px;
  height: 3px;
  background: linear-gradient(90deg, var(--purple), var(--purple-light));
  border-radius: 3px;
  margin: 0 auto 2.5rem;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2rem, 5vw, 3.2rem);
  font-weight: 600;
  color: var(--navy);
  margin-bottom: 1rem;
  letter-spacing: -0.02em;
}

.highlight {
  color: var(--purple);
}

p {
  font-size: 1.15rem;
  color: var(--slate);
  line-height: 1.7;
  max-width: 460px;
  margin: 0 auto 2rem;
  font-weight: 400;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--white);
  border: 1px solid var(--purple-pale);
  padding: 10px 22px;
  border-radius: 999px;
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--purple);
  box-shadow: 0 2px 12px rgba(107,63,160,0.08);
}

.badge .dot {
  width: 8px;
  height: 8px;
  background: var(--purple);
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

@media (max-width: 480px) {
  .logo { width: 170px; margin-bottom: 2.5rem; }
  .container { padding: 2rem 1.5rem; }
  p { font-size: 1.05rem; }
}
</style>
</head>
<body>

<div class="container">
  <img src="372-logo.png" alt="372 Dental" class="logo">
  <div class="divider"></div>
  <h1>Website <span class="highlight">Under Development</span></h1>
  <p>We're working on something great. Our new website is coming soon. In the meantime, feel free to contact us directly.</p>
  <div class="badge">
    <span class="dot"></span>
    Coming Soon
  </div>
</div>

</body>
</html>
